<style>
  :root{
    --sat:env(safe-area-inset-top,0px); --sar:env(safe-area-inset-right,0px);
    --sab:env(safe-area-inset-bottom,0px); --sal:env(safe-area-inset-left,0px);
    --rgpd-h:0px; --ui-h:44px; --ui-gap:16px; --reply-gap:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#15171c;color:#ddd;font-family:system-ui,sans-serif;overflow:hidden}
  #bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:#15171c}
  #bg img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;filter:blur(3px);transform:scale(1.025)}
  #bg::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(6,7,10,.5),rgba(6,7,10,.18) 42%,rgba(6,7,10,.46));pointer-events:none}
  #c{position:fixed;inset:0;z-index:1;display:block;width:100vw;height:100vh}
  #ui{position:fixed;left:calc(16px + var(--sal));right:calc(16px + var(--sar));
      bottom:calc(var(--ui-gap) + var(--sab) + var(--rgpd-h));transition:bottom .2s;
      display:grid;grid-template-columns:repeat(4,max-content);gap:10px;align-items:center;justify-content:start;z-index:3}
  button{background:#e11d48;color:#fff;border:0;padding:12px 18px;border-radius:8px;font-size:15px;cursor:pointer;
         min-height:44px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #status{position:fixed;left:calc(16px + var(--sal));top:calc(12px + var(--sat));font-size:13px;opacity:.7;z-index:3;
          max-width:calc(100vw - 32px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #heard{position:fixed;left:calc(16px + var(--sal));top:calc(36px + var(--sat));max-width:min(520px,70vw);
         font-size:15px;line-height:1.35;color:#fff;
         padding:7px 10px;border-radius:8px;background:rgba(8,10,14,.5);opacity:0;transition:opacity .2s;z-index:3}
  #heard.on{opacity:1}
  #name{position:fixed;top:calc(14px + var(--sat));left:0;right:0;text-align:center;font-size:26px;font-weight:700;
        letter-spacing:.06em;background:linear-gradient(90deg,#7cc4ff,#b18cff);-webkit-background-clip:text;
        background-clip:text;color:transparent;text-shadow:0 2px 10px rgba(0,0,0,.4);pointer-events:none;z-index:3}
  #reply{position:fixed;left:50%;transform:translateX(-50%);
         bottom:calc(var(--ui-gap) + var(--ui-h) + var(--reply-gap) + var(--sab) + var(--rgpd-h));
         max-width:min(860px,90vw);text-align:center;font-size:22px;line-height:1.35;color:#fff;
         max-height:calc(100vh - var(--sat) - var(--sab) - var(--rgpd-h) - var(--ui-h) - var(--ui-gap) - var(--reply-gap) - 90px);
         overflow-y:auto;overflow-wrap:anywhere;
         padding:8px 16px;border-radius:10px;background:rgba(8,10,14,.62);
         text-shadow:0 1px 3px #000;opacity:0;transition:opacity .25s, bottom .2s;z-index:3}
  #reply.on{opacity:1}
  #prefs{position:fixed;top:calc(44px + var(--sat));right:calc(14px + var(--sar));display:flex;flex-direction:column;
         gap:6px;align-items:flex-end;font-size:13px;max-width:min(220px,42vw);z-index:3}
  #prefs label{display:flex;gap:6px;align-items:center;background:rgba(8,10,14,.6);padding:6px 10px;border-radius:8px;
               cursor:pointer;min-height:32px}
  #prefs button{background:#3a2140;color:#f3d0ff;border:0;padding:6px 10px;border-radius:8px;font-size:12px;
                cursor:pointer;min-height:32px;width:100%}
  #rgpd{position:fixed;left:0;right:0;bottom:0;display:none;gap:14px;align-items:center;justify-content:center;
        flex-wrap:wrap;padding:calc(12px + var(--sab)) calc(18px + var(--sar)) calc(12px + var(--sab)) calc(18px + var(--sal));
        background:rgba(8,10,14,.94);border-top:1px solid #333;font-size:13px;z-index:5;
        max-height:60vh;overflow-y:auto}
  #rgpd b{color:#9cf} #rgpd button{background:#e11d48;color:#fff;border:0;padding:10px 16px;border-radius:8px;
          cursor:pointer;min-height:44px;white-space:nowrap}
  #startOverlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:4;
                background:rgba(10,12,16,.55);backdrop-filter:blur(2px);padding:20px}
  #start{font-size:18px;padding:16px 30px;border-radius:12px;min-height:52px}
  #start:disabled{opacity:.5;cursor:default}

  @media (max-width: 640px){
    :root{--ui-gap:12px;--reply-gap:10px}
    #name{font-size:20px}
    #reply{font-size:17px;padding:7px 12px}
    #heard{font-size:13px;max-width:min(300px,62vw)}
    #status{font-size:12px}
    #ui{left:calc(12px + var(--sal));right:calc(12px + var(--sar));
        gap:8px;grid-template-columns:repeat(2,minmax(0,1fr))}
    #ui button{font-size:13px;padding:11px 12px;width:100%}
    #prefs{font-size:12px;max-width:min(160px,46vw)}
    #prefs label{padding:5px 8px}
    #rgpd{font-size:12px;padding-left:calc(14px + var(--sal));padding-right:calc(14px + var(--sar))}
  }
  @media (max-width: 330px){
    #ui{grid-template-columns:1fr}
    #ui button{width:100%}
  }
</style>
</head>
<body>
<div id="bg" aria-hidden="true"><img src="/graffiti-lounge-bg.png" alt=""></div>
<canvas id="c"></canvas>
<div id="name">Nora</div>
<div id="status">chargement…</div>
<div id="heard"></div>
<div id="reply"></div>
<div id="ui">
  <button id="mic">🎤 Parler</button>
  <button id="imageBtn" style="background:#334">🖼 Image</button>
  <button id="linkBtn" style="background:#334">🔗 Lien</button>
  <button id="play" style="background:#334">▶ Démo « Hello World »</button>
  <input type="file" id="imageInput" accept="image/*" hidden>
</div>
<div id="prefs">
  <label><input type="checkbox" id="saveChk"> Enregistrer ce que l'on dit</label>
  <button id="clearBtn">🗑 Effacer l'historique</button>
</div>
<div id="rgpd">
  <span>🔒 Nora mémorise la conversation <b>uniquement dans votre navigateur</b> (localStorage), et seulement si vous cochez « Enregistrer ». Les messages utiles au contexte sont envoyés au modèle (Mistral) et à ce serveur pour répondre et générer la voix, mais <b>ne sont pas stockés côté serveur</b>.</span>
  <button id="rgpdOk">J'ai compris</button>
</div>
<div id="startOverlay"><button id="start" disabled>chargement…</button></div>

<script type="importmap">
{ "imports": {
  "three": "./vendor/three.module.js",
  "three/addons/": "./vendor/addons/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const statusEl = document.getElementById('status');
const heardEl = document.getElementById('heard');
const replyEl = document.getElementById('reply');
const set = t => statusEl.textContent = t;
function showHeard(text){
  heardEl.textContent = text ? 'Vous : ' + text : '';
  heardEl.classList.toggle('on', Boolean(text));
}
async function postJson(url, payload){
  console.time(url);
  const r = await fetch(url, {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify(payload)});
  const text = await r.text();
  console.timeEnd(url);
  console.log(url, r.status, text.slice(0, 240));
  let data;
  try { data = JSON.parse(text); }
  catch(e){ throw new Error('réponse non-JSON HTTP '+r.status+': '+text.slice(0, 160)); }
  if(!r.ok || data.error) throw new Error(data.error || ('HTTP '+r.status));
  return data;
}

// ---- scene ----
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true, alpha:true, preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(28, innerWidth/innerHeight, 0.01, 100);

scene.add(new THREE.HemisphereLight(0xffffff, 0x4b4652, 1.35));
const key = new THREE.DirectionalLight(0xffffff, 1.95); key.position.set(-1,1.4,2); scene.add(key);
const fill = new THREE.DirectionalLight(0xf0e6dc, 1.35); fill.position.set(2.6,0.9,2.4); scene.add(fill);
const faceFill = new THREE.DirectionalLight(0xffffff, 0.55); faceFill.position.set(0,0.4,2.8); scene.add(faceFill);

function resize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); }
addEventListener('resize', resize); resize();

// ---- load avatar ----
let face = null, dict = null, infl = null, target = null, avatarRoot = null, baseRot = null;
new GLTFLoader().load('avatar.glb', (gltf)=>{
  const root = gltf.scene;
  avatarRoot = root;
  baseRot = root.rotation.clone();
  root.traverse(o=>{ if(o.isMesh && o.morphTargetInfluences){ face=o; dict=o.morphTargetDictionary; infl=o.morphTargetInfluences; } });
  scene.add(root);
  // frame the head (after Y-up export the face looks toward +Z)
  const box = new THREE.Box3().setFromObject(root);
  const size = box.getSize(new THREE.Vector3()), c = box.getCenter(new THREE.Vector3());
  const headY = box.min.y + size.y*0.82;
  const dist = size.y*0.55 / Math.tan(THREE.MathUtils.degToRad(camera.fov*0.5));
  camera.position.set(c.x, headY, box.max.z + dist);
  camera.lookAt(c.x, headY, c.z);
  target = new Float32Array(infl.length);
  window.__dbg = { box, size, center:c, camPos:camera.position.clone(), morphs:Object.keys(dict), meshName:face.name };
  window.__three = { renderer, scene, camera, face, dict, infl,
                     forceRender:()=>renderer.render(scene,camera),
                     setMorph:(n,v)=>{ if(dict[n]!==undefined) infl[dict[n]]=v; } };
  set('prêt');
  const sb = document.getElementById('start');
  sb.disabled = false; sb.textContent = '▶ Démarrer';
}, undefined, e=>set('erreur glb: '+e));

// ---- lipsync playback ----
let cues=null, audio=null, playing=false, subWords=[];
let wantsListen = false, listening = false, busy = false;
let startListening = ()=>{};
function currentViseme(t){
  if(!cues) return 'X';
  for(const q of cues){ if(t>=q.start && t<q.end) return q.value; }
  return 'X';
}
// play an audio clip (url or data-uri), drive morphs from cues, show subtitles
function speak(audioSrc, newCues, text){
  cues = newCues;
  subWords = (text||'').split(/\s+/).filter(Boolean);
  if(subWords.length){ replyEl.textContent=''; replyEl.classList.add('on'); }
  else { replyEl.classList.remove('on'); replyEl.textContent=''; }
  if(audio){ audio.pause(); }
  audio = new Audio(audioSrc);
  audio.onended = ()=>{
    playing=false;
    set(wantsListen ? 'écoute…' : 'à toi 🎤');
    if(wantsListen) startListening();
  };
  audio.oncanplay = ()=>{
    audio.play().then(()=>{
      playing=true;
      set('elle parle…');
    }).catch(err=>set('audio bloqué: '+err.message));
  };
}

// ---- idle (blink + occasional brow) ----
let nextBlink = performance.now()/1000 + 1.5, blinkT = -1;
let nextBrow = performance.now()/1000 + 3, browT = -1, browVal = 0;
function idle(now, dt){
  if(!face) return;
  if(avatarRoot && baseRot){
    const talk = playing ? 0.014 : 0.008;
    avatarRoot.rotation.x = baseRot.x + Math.sin(now*0.9) * talk;
    avatarRoot.rotation.y = baseRot.y + Math.sin(now*0.55) * talk * 1.4;
    avatarRoot.rotation.z = baseRot.z + Math.sin(now*0.7 + 1.2) * talk * 0.45;
  }
  // blink
  if(blinkT<0 && now>nextBlink){ blinkT=0; nextBlink=now+2.5+Math.random()*3; }
  let blink=0;
  if(blinkT>=0){ blinkT+=dt; const p=blinkT/0.16; blink = p<1 ? Math.sin(p*Math.PI) : (blinkT=-1,0); }
  setMorph('blink', blink);
  // brow
  if(browT<0 && now>nextBrow){ browT=0; browVal=0.5+Math.random()*0.5; nextBrow=now+4+Math.random()*5; }
  let brow=0;
  if(browT>=0){ browT+=dt; const p=browT/0.9; brow = p<1 ? Math.sin(p*Math.PI)*browVal : (browT=-1,0); }
  setMorph('browUp', brow);
  if(!playing){
    setMorph('E', 0.035 + Math.sin(now*1.1)*0.012);
  }
}
function setMorph(name,v){ const i=dict[name]; if(i!==undefined) infl[i]=v; }

const VIS = ['A','B','C','D','E','F','G','H'];
let last = performance.now();
function tick(){
  requestAnimationFrame(tick);
  const now = performance.now()/1000, dt = Math.min(0.05,(performance.now()-last)/1000); last=performance.now();
  if(face){
    // desired viseme influence
    target.fill(0);
    if(playing && !audio.paused){
      const v = currentViseme(audio.currentTime);
      if(v!=='X' && dict[v]!==undefined) target[dict[v]] = 1;
      // reveal subtitles proportionally to audio progress
      if(subWords.length && audio.duration){
        const n = Math.max(1, Math.ceil(Math.min(1,audio.currentTime/audio.duration)*subWords.length));
        const shown = subWords.slice(0,n).join(' ');
        if(replyEl.textContent!==shown) replyEl.textContent = shown;
      }
    }
    // smooth toward target (co-articulation), but leave idle morphs to idle()
    for(const v of VIS){ const i=dict[v]; infl[i] += (target[i]-infl[i]) * Math.min(1, dt*18); }
    idle(now, dt);
  }
  renderer.render(scene,camera);
}
tick();

// demo button (static Hello World clip)
document.getElementById('play').onclick = async ()=>{
  const c = (await (await fetch('helloworld.json')).json()).mouthCues;
  speak('helloworld.mp3', c, 'Hello World.');
};

// spoken greeting (needs a user gesture to allow audio) -> then mic is ready
const GREETING = "Bonjour, je suis Nora. Je suis là pour discuter avec vous.";
async function serverSay(text){
  const data = await postJson('/api/say', {text});
  speak('data:'+data.mime+';base64,'+data.audio, data.cues, text);
}
document.getElementById('start').onclick = async ()=>{
  document.getElementById('startOverlay').style.display='none';
  set('elle parle…');
  try{ await serverSay(GREETING); }
  catch(err){ set('accueil indisponible ('+err.message+') — clique 🎤'); }
};

// ---- conversation history + RGPD (all client-side, localStorage) ----
const HKEY='nora_history', SKEY='nora_save', RKEY='nora_rgpd', CKEY='nora_compact';
let history = [];
let saveOn = localStorage.getItem(SKEY) === '1';   // privacy by default: off
let compactSummary = '';
if(saveOn){
  try { history = JSON.parse(localStorage.getItem(HKEY) || '[]'); } catch(e){}
  compactSummary = localStorage.getItem(CKEY) || '';
}
const saveChk = document.getElementById('saveChk');
saveChk.checked = saveOn;
saveChk.onchange = ()=>{
  saveOn = saveChk.checked;
  localStorage.setItem(SKEY, saveOn?'1':'0');
  if(saveOn) persist();
  else {
    compactSummary = '';
    localStorage.removeItem(HKEY);
    localStorage.removeItem(CKEY);
  }
};
function persist(){
  if(!saveOn) return;
  localStorage.setItem(HKEY, JSON.stringify(history.slice(-12)));
  if(compactSummary) localStorage.setItem(CKEY, compactSummary);
}
function buildContext(){
  const ctx = [];
  if(saveOn && compactSummary){
    ctx.push({role:'system', content:'Mémoire compacte des échanges précédents: '+compactSummary});
  }
  return ctx.concat(history.slice(saveOn ? -6 : -4));
}
let compacting = false;
function scheduleCompact(){
  if(!saveOn || compacting || history.length < 8) return;
  compacting = true;
  setTimeout(async ()=>{
    if(playing || busy || listening){ compacting = false; scheduleCompact(); return; }
    try{
      const data = await postJson('/api/compact', {summary: compactSummary, history: history.slice(-12)});
      compactSummary = data.summary || compactSummary;
      history = history.slice(-6);
      persist();
    }catch(e){
      console.warn('compact failed', e);
    }finally{
      compacting = false;
    }
  }, 8000);
}
document.getElementById('clearBtn').onclick = ()=>{
  history = [];
  compactSummary = '';
  localStorage.removeItem(HKEY);
  localStorage.removeItem(CKEY);
  set('historique effacé');
};

function fileToDataUrl(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = ()=>reject(reader.error || new Error('lecture image impossible'));
    reader.readAsDataURL(file);
  });
}
async function analyzeWithNora({endpoint, payload, userLabel, memoryText}){
  busy = true;
  replyEl.classList.remove('on');
  showHeard(userLabel);
  set('Nora analyse…');
  try{
    const llm = await postJson(endpoint, {...payload, history: buildContext()});
    history.push({role:'user', content: memoryText}, {role:'assistant', content: llm.reply});
    persist();
    scheduleCompact();
    set('Nora prépare sa voix…');
    const voice = await postJson('/api/say', {text: llm.reply});
    set('voix prête…');
    speak('data:'+voice.mime+';base64,'+voice.audio, voice.cues, llm.reply);
  }catch(e){
    set('analyse impossible: '+e.message);
  }finally{
    busy = false;
    if(!playing) micBtn.textContent = wantsListen ? '🎤 Écoute…' : '🎤 Parler';
  }
}

const imageInput = document.getElementById('imageInput');
document.getElementById('imageBtn').onclick = ()=>imageInput.click();
imageInput.onchange = async ()=>{
  const file = imageInput.files && imageInput.files[0];
  imageInput.value = '';
  if(!file) return;
  if(!file.type.startsWith('image/')) return set('fichier image attendu');
  if(file.size > 5_000_000) return set('image trop grande (max 5 Mo)');
  const prompt = window.prompt('Que veux-tu demander à Nora sur cette image ?', "Qu'est-ce que tu vois ?");
  if(prompt === null) return;
  try{
    const image = await fileToDataUrl(file);
    await analyzeWithNora({
      endpoint: '/api/analyze-image',
      payload: {image, prompt},
      userLabel: 'Image : '+file.name,
      memoryText: '[Image envoyée: '+file.name+'] '+(prompt || 'Analyse cette image.'),
    });
  }catch(e){
    set('image: '+e.message);
  }
};
document.getElementById('linkBtn').onclick = async ()=>{
  const url = window.prompt('Lien à analyser par Nora');
  if(!url) return;
  const prompt = window.prompt('Que veux-tu demander à Nora sur ce lien ?', 'Analyse ce lien.');
  if(prompt === null) return;
  await analyzeWithNora({
    endpoint: '/api/analyze-link',
    payload: {url, prompt},
    userLabel: 'Lien : '+url,
    memoryText: '[Lien envoyé: '+url+'] '+(prompt || 'Analyse ce lien.'),
  });
};
// RGPD banner (once) -- while shown, push the bottom UI/subtitles above it
// (measured, not guessed: the banner's text wraps differently per viewport).
const rgpdEl = document.getElementById('rgpd');
function updateRgpdOffset(){
  const h = rgpdEl.style.display === 'none' ? 0 : rgpdEl.getBoundingClientRect().height;
  document.documentElement.style.setProperty('--rgpd-h', h + 'px');
  const ui = document.getElementById('ui');
  const uiH = ui ? ui.getBoundingClientRect().height : 44;
  document.documentElement.style.setProperty('--ui-h', uiH + 'px');
}
if(localStorage.getItem(RKEY) !== '1'){
  rgpdEl.style.display = 'flex';
  // wait for layout to settle (wrapped text) before measuring the real height
  // (setTimeout, not rAF: rAF is paused in background/inactive tabs)
  setTimeout(updateRgpdOffset, 50);
}
setTimeout(updateRgpdOffset, 50);
document.getElementById('rgpdOk').onclick = ()=>{
  localStorage.setItem(RKEY,'1'); rgpdEl.style.display='none'; updateRgpdOffset();
};
addEventListener('resize', updateRgpdOffset);

// ---- voice conversation : mic (STT) -> /api/chat -> speak ----
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const micBtn = document.getElementById('mic');
if(!SR){ micBtn.disabled=true; micBtn.textContent='🎤 (navigateur non compatible)'; }
else {
  const rec = new SR(); rec.lang='fr-FR'; rec.interimResults=false; rec.maxAlternatives=1;
  startListening = function(){
    if(!wantsListen || listening || busy || playing) return;
    set('écoute…');
    micBtn.textContent = '🎤 Écoute…';
    try{ rec.start(); }catch(e){}
  };
  micBtn.onclick = ()=>{
    wantsListen = !wantsListen;
    micBtn.textContent = wantsListen ? '⏸ Stop' : '🎤 Parler';
    if(wantsListen) startListening();
    else set('à toi 🎤');
  };
  rec.onstart = ()=>{
    listening = true;
    micBtn.textContent = '🎤 Écoute…';
  };
  rec.onend = ()=>{
    listening = false;
    if(!busy && !playing){
      micBtn.textContent = wantsListen ? '🎤 Écoute…' : '🎤 Parler';
      if(wantsListen) setTimeout(startListening, 250);
    }
  };
  rec.onresult = async (ev)=>{
    const text = ev.results[0][0].transcript;
    busy = true;
    micBtn.textContent = '…';
    replyEl.classList.remove('on');
    showHeard(text);
    set('« '+text+' »');
    try{
      set('Nora réfléchit…');
      const voice = await postJson('/api/chat', {text, history: buildContext()});
      history.push({role:'user', content:text}, {role:'assistant', content:voice.reply});
      persist();
      scheduleCompact();
      set('voix prête…');
      speak('data:'+voice.mime+';base64,'+voice.audio, voice.cues, voice.reply);
    }catch(e){
      set('erreur réseau: '+e.message);
      if(wantsListen) setTimeout(startListening, 800);
    } finally {
      busy = false;
      if(!playing) micBtn.textContent = wantsListen ? '🎤 Écoute…' : '🎤 Parler';
    }
  };
  rec.onerror = (e)=>{
    listening = false;
    set('micro: '+e.error);
    if(wantsListen && !busy && !playing) setTimeout(startListening, 800);
  };
}
</script>
</body>
</html>
