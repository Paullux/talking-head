<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nora — avatar vocal</title>
<style>
  html,body{margin:0;height:100%;background:#15171c;color:#ddd;font-family:system-ui,sans-serif;overflow:hidden}
  #c{display:block;width:100vw;height:100vh}
  #ui{position:fixed;left:16px;bottom:16px;display:flex;gap:10px;align-items:center}
  button{background:#e11d48;color:#fff;border:0;padding:10px 18px;border-radius:8px;font-size:15px;cursor:pointer}
  #status{position:fixed;left:16px;top:12px;font-size:13px;opacity:.7}
  #name{position:fixed;top:14px;left:0;right:0;text-align:center;font-size:26px;font-weight:700;letter-spacing:.06em;
        background:linear-gradient(90deg,#7cc4ff,#b18cff);-webkit-background-clip:text;background-clip:text;color:transparent;
        text-shadow:0 2px 10px rgba(0,0,0,.4);pointer-events:none}
  #reply{position:fixed;left:50%;transform:translateX(-50%);bottom:74px;max-width:min(860px,90vw);
         text-align:center;font-size:22px;line-height:1.35;color:#fff;
         padding:8px 16px;border-radius:10px;background:rgba(8,10,14,.62);
         text-shadow:0 1px 3px #000;opacity:0;transition:opacity .25s}
  #reply.on{opacity:1}
  #prefs{position:fixed;top:44px;right:14px;display:flex;flex-direction:column;gap:6px;align-items:flex-end;font-size:13px}
  #prefs label{display:flex;gap:6px;align-items:center;background:rgba(8,10,14,.6);padding:6px 10px;border-radius:8px;cursor:pointer}
  #prefs button{background:#3a2140;color:#f3d0ff;border:0;padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer}
  #rgpd{position:fixed;left:0;right:0;bottom:0;display:none;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap;
        padding:12px 18px;background:rgba(8,10,14,.94);border-top:1px solid #333;font-size:13px;z-index:5}
  #rgpd b{color:#9cf} #rgpd button{background:#e11d48;color:#fff;border:0;padding:8px 16px;border-radius:8px;cursor:pointer}
  #startOverlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(10,12,16,.55);backdrop-filter:blur(2px)}
  #start{font-size:18px;padding:16px 30px;border-radius:12px}
  #start:disabled{opacity:.5;cursor:default}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="name">Nora</div>
<div id="status">chargement…</div>
<div id="reply"></div>
<div id="ui">
  <button id="mic">🎤 Parler</button>
  <button id="play" style="background:#334">▶ Démo « Hello World »</button>
</div>
<div id="prefs">
  <label><input type="checkbox" id="saveChk"> Enregistrer ce que l'on dit</label>
  <button id="clearBtn">🗑 Effacer l'historique</button>
</div>
<div id="rgpd">
  <span>🔒 Nora mémorise la conversation <b>uniquement dans votre navigateur</b> (localStorage), et seulement si vous cochez « Enregistrer ». Vos messages sont envoyés au modèle (Mistral) et à ce serveur pour générer la voix, mais <b>ne sont pas stockés côté serveur</b>.</span>
  <button id="rgpdOk">J'ai compris</button>
</div>
<div id="startOverlay"><button id="start" disabled>chargement…</button></div>

<script type="importmap">
{ "imports": {
  "three": "./vendor/three.module.js",
  "three/addons/": "./vendor/addons/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const statusEl = document.getElementById('status');
const replyEl = document.getElementById('reply');
const set = t => statusEl.textContent = t;
async function postJson(url, payload){
  console.time(url);
  const r = await fetch(url, {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify(payload)});
  const text = await r.text();
  console.timeEnd(url);
  console.log(url, r.status, text.slice(0, 240));
  let data;
  try { data = JSON.parse(text); }
  catch(e){ throw new Error('réponse non-JSON HTTP '+r.status+': '+text.slice(0, 160)); }
  if(!r.ok || data.error) throw new Error(data.error || ('HTTP '+r.status));
  return data;
}

// ---- scene ----
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true, preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15171c);
const camera = new THREE.PerspectiveCamera(28, innerWidth/innerHeight, 0.01, 100);

scene.add(new THREE.HemisphereLight(0xffffff, 0x333340, 1.1));
const key = new THREE.DirectionalLight(0xffffff, 2.2); key.position.set(-1,1.4,2); scene.add(key);
const fill = new THREE.DirectionalLight(0xbbd0ff, 0.6); fill.position.set(1.5,0.3,1.2); scene.add(fill);

function resize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); }
addEventListener('resize', resize); resize();

// ---- load avatar ----
let face = null, dict = null, infl = null, target = null;
new GLTFLoader().load('avatar.glb', (gltf)=>{
  const root = gltf.scene;
  root.traverse(o=>{ if(o.isMesh && o.morphTargetInfluences){ face=o; dict=o.morphTargetDictionary; infl=o.morphTargetInfluences; } });
  scene.add(root);
  // frame the head (after Y-up export the face looks toward +Z)
  const box = new THREE.Box3().setFromObject(root);
  const size = box.getSize(new THREE.Vector3()), c = box.getCenter(new THREE.Vector3());
  const headY = box.min.y + size.y*0.82;
  const dist = size.y*0.55 / Math.tan(THREE.MathUtils.degToRad(camera.fov*0.5));
  camera.position.set(c.x, headY, box.max.z + dist);
  camera.lookAt(c.x, headY, c.z);
  target = new Float32Array(infl.length);
  window.__dbg = { box, size, center:c, camPos:camera.position.clone(), morphs:Object.keys(dict), meshName:face.name };
  window.__three = { renderer, scene, camera, face, dict, infl,
                     forceRender:()=>renderer.render(scene,camera),
                     setMorph:(n,v)=>{ if(dict[n]!==undefined) infl[dict[n]]=v; } };
  set('prêt');
  const sb = document.getElementById('start');
  sb.disabled = false; sb.textContent = '▶ Démarrer';
}, undefined, e=>set('erreur glb: '+e));

// ---- lipsync playback ----
let cues=null, audio=null, playing=false, subWords=[];
function currentViseme(t){
  if(!cues) return 'X';
  for(const q of cues){ if(t>=q.start && t<q.end) return q.value; }
  return 'X';
}
// play an audio clip (url or data-uri), drive morphs from cues, show subtitles
function speak(audioSrc, newCues, text){
  cues = newCues;
  subWords = (text||'').split(/\s+/).filter(Boolean);
  if(subWords.length){ replyEl.textContent=''; replyEl.classList.add('on'); }
  else { replyEl.classList.remove('on'); replyEl.textContent=''; }
  if(audio){ audio.pause(); }
  audio = new Audio(audioSrc);
  audio.onended = ()=>{ playing=false; set('à toi 🎤'); setTimeout(()=>replyEl.classList.remove('on'), 1400); };
  audio.oncanplay = ()=>{ audio.play(); playing=true; set('elle parle…'); };
}

// ---- idle (blink + occasional brow) ----
let nextBlink = performance.now()/1000 + 1.5, blinkT = -1;
let nextBrow = performance.now()/1000 + 3, browT = -1, browVal = 0;
function idle(now, dt){
  if(!face) return;
  // blink
  if(blinkT<0 && now>nextBlink){ blinkT=0; nextBlink=now+2.5+Math.random()*3; }
  let blink=0;
  if(blinkT>=0){ blinkT+=dt; const p=blinkT/0.16; blink = p<1 ? Math.sin(p*Math.PI) : (blinkT=-1,0); }
  setMorph('blink', blink);
  // brow
  if(browT<0 && now>nextBrow){ browT=0; browVal=0.5+Math.random()*0.5; nextBrow=now+4+Math.random()*5; }
  let brow=0;
  if(browT>=0){ browT+=dt; const p=browT/0.9; brow = p<1 ? Math.sin(p*Math.PI)*browVal : (browT=-1,0); }
  setMorph('browUp', brow);
}
function setMorph(name,v){ const i=dict[name]; if(i!==undefined) infl[i]=v; }

const VIS = ['A','B','C','D','E','F','G','H'];
let last = performance.now();
function tick(){
  requestAnimationFrame(tick);
  const now = performance.now()/1000, dt = Math.min(0.05,(performance.now()-last)/1000); last=performance.now();
  if(face){
    // desired viseme influence
    target.fill(0);
    if(playing && !audio.paused){
      const v = currentViseme(audio.currentTime);
      if(v!=='X' && dict[v]!==undefined) target[dict[v]] = 1;
      // reveal subtitles proportionally to audio progress
      if(subWords.length && audio.duration){
        const n = Math.max(1, Math.ceil(Math.min(1,audio.currentTime/audio.duration)*subWords.length));
        const shown = subWords.slice(0,n).join(' ');
        if(replyEl.textContent!==shown) replyEl.textContent = shown;
      }
    }
    // smooth toward target (co-articulation), but leave idle morphs to idle()
    for(const v of VIS){ const i=dict[v]; infl[i] += (target[i]-infl[i]) * Math.min(1, dt*18); }
    idle(now, dt);
  }
  renderer.render(scene,camera);
}
tick();

// demo button (static Hello World clip)
document.getElementById('play').onclick = async ()=>{
  const c = (await (await fetch('helloworld.json')).json()).mouthCues;
  speak('helloworld.mp3', c, 'Hello World.');
};

// spoken greeting (needs a user gesture to allow audio) -> then mic is ready
const GREETING = "Bonjour, je suis Nora. Je suis là pour discuter avec vous.";
async function serverSay(text){
  const data = await postJson('/api/say', {text});
  speak('data:'+data.mime+';base64,'+data.audio, data.cues, text);
}
document.getElementById('start').onclick = async ()=>{
  document.getElementById('startOverlay').style.display='none';
  set('elle parle…');
  try{ await serverSay(GREETING); }
  catch(err){ set('accueil indisponible ('+err.message+') — clique 🎤'); }
};

// ---- conversation history + RGPD (all client-side, localStorage) ----
const HKEY='nora_history', SKEY='nora_save', RKEY='nora_rgpd';
let history = [];
try { history = JSON.parse(localStorage.getItem(HKEY) || '[]'); } catch(e){}
let saveOn = localStorage.getItem(SKEY) === '1';   // privacy by default: off
const saveChk = document.getElementById('saveChk');
saveChk.checked = saveOn;
saveChk.onchange = ()=>{ saveOn = saveChk.checked; localStorage.setItem(SKEY, saveOn?'1':'0'); if(saveOn) persist(); };
function persist(){ if(saveOn) localStorage.setItem(HKEY, JSON.stringify(history.slice(-40))); }
document.getElementById('clearBtn').onclick = ()=>{
  history = []; localStorage.removeItem(HKEY); set('historique effacé');
};
// RGPD banner (once)
if(localStorage.getItem(RKEY) !== '1') document.getElementById('rgpd').style.display = 'flex';
document.getElementById('rgpdOk').onclick = ()=>{
  localStorage.setItem(RKEY,'1'); document.getElementById('rgpd').style.display='none';
};

// ---- voice conversation : mic (STT) -> /api/chat -> speak ----
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const micBtn = document.getElementById('mic');
if(!SR){ micBtn.disabled=true; micBtn.textContent='🎤 (navigateur non compatible)'; }
else {
  const rec = new SR(); rec.lang='fr-FR'; rec.interimResults=false; rec.maxAlternatives=1;
  micBtn.onclick = ()=>{ set('écoute…'); try{ rec.start(); }catch(e){} };
  rec.onresult = async (ev)=>{
    const text = ev.results[0][0].transcript;
    set('« '+text+' »');
    try{
      set('Nora réfléchit…');
      const data = await postJson('/api/chat', {text, history: history.slice(-8)});
      history.push({role:'user', content:text}, {role:'assistant', content:data.reply});
      persist();
      set('voix prête…');
      speak('data:'+data.mime+';base64,'+data.audio, data.cues, data.reply);
    }catch(e){ set('erreur réseau: '+e.message); }
  };
  rec.onerror = (e)=> set('micro: '+e.error);
}
</script>
</body>
</html>
